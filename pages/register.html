<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - YoruVerse</title>
  <meta name="description" content="Create your YoruVerse account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/donation.css">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/png" href="../images/O.png">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-fadeIn">
      <div class="auth-logo">
        <a href="../index.html" class="logo" style="justify-content:center;">
          <img src="../images/Y.png" alt="YoruVerse" class="logo-text-img">
        </a>
        <p>Create your free account.</p>
      </div>

      <form id="registerForm" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Choose a username" required minlength="3" maxlength="30">
          <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" required>
          <div class="form-error" id="confirmPasswordError"></div>
        </div>

        <div style="margin-bottom:var(--space-lg);">
          <label style="display:flex;align-items:flex-start;gap:var(--space-sm);font-size:0.8125rem;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" id="agreeTerms" required style="width:16px;height:16px;margin-top:2px;">
            I agree to the <a href="about.html#terms" style="color:var(--accent-primary);">Terms of Service</a> and <a href="about.html#privacy" style="color:var(--accent-primary);">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn" onclick="handleRegister()">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="auth-divider">or register with</div>

      <button class="google-btn" onclick="handleGoogleRegister()">
        <i class="fab fa-google"></i> Continue with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="../js/path-utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>

  <script>
    UI.init();

    window.addEventListener('authStateChanged', (e) => {
      if (e.detail.user) {
        window.location.href = '../index.html';
      }
    });

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;

      // Validation
      if (!username || !email || !password || !confirmPassword) {
        showToast('Please fill in all fields', 'warning');
        return;
      }

      if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }

      if (!agreeTerms) {
        showToast('Please agree to the terms', 'warning');
        return;
      }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm" style="border-color:white;display:inline-block;vertical-align:middle;margin-right:8px;"></div> Creating account...';

      const result = await Auth.register(email, password, username);
      
      if (result.success) {
        window.location.href = '../index.html';
      }
      
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }

    async function handleGoogleRegister() {
      const result = await Auth.loginWithGoogle();
      if (result.success) {
        window.location.href = '../index.html';
      }
    }
  </script>
  <script src="../js/shared-header.js"></script>
</body>
</html>
