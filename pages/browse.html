      <!-- Filters (sticky, responsive toolbar) -->
      <div class="browse-toolbar" role="region" aria-label="Filter series">
        <select id="genreFilter" class="form-input" aria-label="Filter by genre">
          <option value="">All Genres</option>
        </select>
        <select id="creatorFilter" class="form-input" aria-label="Filter by creator">
          <option value="">All Creators</option>
        </select>
        <select id="statusFilter" class="form-input" aria-label="Filter by status">
          <option value="">All Status</option>
          <option value="Ongoing">Ongoing</option>
          <option value="Completed">Completed</option>
          <option value="Hiatus">Hiatus</option>
          <option value="Dropped">Dropped</option>
        </select>
        <select id="sortFilter" class="form-input" aria-label="Sort">
          <option value="updatedAt">Recently Updated</option>
          <option value="createdAt">Newest</option>
          <option value="title">Title (A-Z)</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>


      <!-- Series Grid -->
      <div class="series-grid" id="browseGrid">
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>
        <div class="series-card"><div class="series-card-image"><div class="skeleton" style="width:100%;height:100%;"></div></div><div class="series-card-info"><div class="skeleton" style="width:80%;height:16px;margin-bottom:8px;"></div><div class="skeleton" style="width:50%;height:12px;"></div></div></div>

      <!-- Load More Trigger -->

  <script src="../js/path-utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>
  
  <script>
    // ==================== BROWSE PAGE LOGIC ====================
    
    let currentCursor = null;
    let hasMore = true;
    let isLoading = false;
    let currentFilters = {};
    let infiniteScrollObserver = null;

    document.addEventListener('DOMContentLoaded', async () => {
      UI.init();
      
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hidden');
      }, 500);

      // Parse URL params
      const urlParams = new URLSearchParams(window.location.search);
      const searchQuery = urlParams.get('q');
      const genreParam = urlParams.get('genre');
      const sortParam = urlParams.get('sort');
      const creatorParam = urlParams.get('creator');

      if (searchQuery) {
        document.getElementById('searchInput').value = searchQuery;
        currentFilters.search = searchQuery;
      }

      // Load genres + creators for filters (in parallel)
      await Promise.all([loadGenreOptions(), loadCreatorOptions()]);

      if (genreParam) {
        document.getElementById('genreFilter').value = genreParam;
        currentFilters.genre = genreParam;
      }

      if (creatorParam) {
        const creatorSel = document.getElementById('creatorFilter');
        // Ensure option exists even if not in pool
        if (!Array.from(creatorSel.options).some(o => o.value === creatorParam)) {
          const opt = document.createElement('option');
          opt.value = creatorParam;
          opt.textContent = creatorParam;
          creatorSel.appendChild(opt);
        }
        creatorSel.value = creatorParam;
        currentFilters.creator = creatorParam;
      }

      // Set sort filter
      if (sortParam) {
        const sortMap = { trending: 'viewCount', newest: 'createdAt', updated: 'updatedAt', popular: 'viewCount' };
        document.getElementById('sortFilter').value = sortMap[sortParam] || 'updatedAt';
      }

      // Initial load
      loadSeries(true);

      // Setup infinite scroll
      setupInfiniteScroll();

      // Filter change handlers
      document.getElementById('genreFilter').addEventListener('change', (e) => {
        currentFilters.genre = e.target.value;
        loadSeries(true);
      });

      document.getElementById('creatorFilter').addEventListener('change', (e) => {
        currentFilters.creator = e.target.value;
        loadSeries(true);
      });

      document.getElementById('statusFilter').addEventListener('change', (e) => {
        currentFilters.status = e.target.value;
        loadSeries(true);
      });

      document.getElementById('sortFilter').addEventListener('change', (e) => {
        loadSeries(true);
      });

      // Search input
      const searchInput = document.getElementById('searchInput');
      let debounceTimer;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          currentFilters.search = e.target.value.trim();
          loadSeries(true);
        }, 80);
      });
    });

    async function loadGenreOptions() {
      try {
        const genres = await DB.getGenres();
        const select = document.getElementById('genreFilter');
        // Use genre NAME as option value so the Firestore array-contains
        // query matches exactly how genres are stored on series documents.
        select.innerHTML = '<option value="">All Genres</option>' +
          genres.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
      } catch (error) {
        console.error('Error loading genres:', error);
      }
    }

    async function loadCreatorOptions() {
      try {
        // Pull a sizeable pool of series and extract unique creators
        // (authors + artists). This is client-side because Firestore can't
        // distinct-aggregate without an index.
        const result = await DB.getSeries({
          limit: 500,
          sortBy: 'updatedAt',
          sortOrder: 'desc'
        });
        const creators = new Set();
        (result.series || []).forEach(s => {
          if (s.author && s.author.trim()) creators.add(s.author.trim());
          if (s.artist && s.artist.trim()) creators.add(s.artist.trim());
        });
        const sorted = Array.from(creators).sort((a, b) => a.localeCompare(b));
        const select = document.getElementById('creatorFilter');
        const escape = (v) => String(v).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        select.innerHTML = '<option value="">All Creators</option>' +
          sorted.map(c => `<option value="${escape(c)}">${escape(c)}</option>`).join('');
      } catch (error) {
        console.error('Error loading creators:', error);
      }
    }

    async function loadSeries(reset = false) {
      if (isLoading) return;
      isLoading = true;

      if (reset) {
        currentCursor = null;
        hasMore = true;
      }

      if (!hasMore && !reset) {
        isLoading = false;
        return;
      }

      const sortFilter = document.getElementById('sortFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const genreFilter = document.getElementById('genreFilter').value;
      const creatorFilter = document.getElementById('creatorFilter').value;

      // When filtering by creator we need a larger pool because the filter
      // is applied client-side (creator can be author OR artist).
      const usingCreator = !!creatorFilter;

      try {
        const result = await DB.getSeries({
          limit: usingCreator ? 200 : 20,
          cursor: reset ? null : currentCursor,
          sortBy: sortFilter || 'updatedAt',
          sortOrder: sortFilter === 'title' ? 'asc' : 'desc',
          genre: genreFilter || null,
          status: statusFilter || null,
          search: currentFilters.search || null
        });

        // Client-side creator filter (matches author or artist exactly)
        if (usingCreator && result.series) {
          result.series = result.series.filter(s =>
            (s.author && s.author.trim() === creatorFilter) ||
            (s.artist && s.artist.trim() === creatorFilter)
          );
          // Disable pagination when creator filter is active (pool already large)
          result.hasMore = false;
          result.lastCursor = null;
        }

        currentCursor = result.lastCursor;
        hasMore = result.hasMore;

        const container = document.getElementById('browseGrid');
        
        if (reset) {
          if (result.series.length === 0) {
            container.innerHTML = UI.renderEmptyState(
              'No series found',
              'Try adjusting your filters or search query.'
            );
          } else {
            container.innerHTML = result.series.map(s => UI.renderSeriesCard(s)).join('');
          }
        } else {
          result.series.forEach(s => {
            container.insertAdjacentHTML('beforeend', UI.renderSeriesCard(s));
          });
        }

        // Update count
        const countEl = document.getElementById('resultCount');
        if (countEl) {
          const currentCount = container.querySelectorAll('.series-card').length;
          countEl.textContent = `${currentCount} series`;
        }

        UI.initLazyLoading();

      } catch (error) {
        console.error('Error loading series:', error);
      } finally {
        isLoading = false;
      }
    }

    function setupInfiniteScroll() {
      const trigger = document.getElementById('loadMoreTrigger');
      if (!trigger) return;

      infiniteScrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && !isLoading && hasMore) {
            loadSeries(false);
          }
        });
      }, { rootMargin: '200px' });

      infiniteScrollObserver.observe(trigger);
    }
  </script>
