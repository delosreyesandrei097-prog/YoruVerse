<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - YoruVerse</title>
  <meta name="description" content="Login to your YoruVerse account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/donation.css">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/png" href="../images/O.png">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-fadeIn">
      <div class="auth-logo">
        <a href="../index.html" class="logo" style="justify-content:center;">
          <img src="../images/Y.png" alt="YoruVerse" class="logo-text-img">
        </a>
        <p>Welcome back! Login to your account.</p>
      </div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          <div class="form-error" id="passwordError"></div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg);">
          <label style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.875rem;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" id="rememberMe" style="width:16px;height:16px;"> Remember me
          </label>
          <a href="#" onclick="showForgotPassword(); return false;" style="font-size:0.875rem;color:var(--accent-primary);">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="handleLogin()">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <div class="auth-divider">or continue with</div>

      <button class="google-btn" onclick="handleGoogleLogin()">
        <i class="fab fa-google"></i> Continue with Google
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgotPasswordModal">
    <div class="modal" style="max-width: 420px;">
      <div class="modal-header">
        <h3 class="modal-title">Reset Password</h3>
        <button class="modal-close" onclick="UI.closeModal('forgotPasswordModal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary);margin-bottom:var(--space-lg);">Enter your email and we'll send you a password reset link.</p>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="resetEmail" class="form-input" placeholder="you@example.com">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('forgotPasswordModal')">Cancel</button>
        <button class="btn btn-primary" onclick="handleResetPassword()">Send Reset Link</button>
      </div>
    </div>
  </div>

  <script src="../js/path-utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>

  <script>
    UI.init();

    // Check if already logged in
    window.addEventListener('authStateChanged', (e) => {
      if (e.detail.user) {
        const redirectParam = new URLSearchParams(window.location.search).get('redirect');
        const redirect = redirectParam ? decodeURIComponent(redirectParam) : AppPath.home();
        window.location.href = redirect;
      }
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Please fill in all fields', 'warning');
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm" style="border-color:white;display:inline-block;vertical-align:middle;margin-right:8px;"></div> Logging in...';

      try {
        const rememberMe = document.getElementById('rememberMe')?.checked ?? true;
        const result = await Auth.login(email, password, rememberMe);
        if (result.success) {
          const redirectParam = new URLSearchParams(window.location.search).get('redirect');
          const redirect = redirectParam ? decodeURIComponent(redirectParam) : AppPath.home();
          window.location.href = redirect;
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    }

    async function handleGoogleLogin() {
      const rememberMe = document.getElementById('rememberMe')?.checked ?? true;
      const result = await Auth.loginWithGoogle(rememberMe);
      // On mobile / in-app browsers Google sign-in does a full-page redirect;
      // the result lands via getRedirectResult() in auth.js. Don't navigate
      // here in that case (window will be replaced by the provider).
      if (result.success && !result.redirected) {
        const redirectParam = new URLSearchParams(window.location.search).get('redirect');
        const redirect = redirectParam ? decodeURIComponent(redirectParam) : AppPath.home();
        window.location.href = redirect;
      }
    }

    function showForgotPassword() {
      UI.openModal('forgotPasswordModal');
    }

    async function handleResetPassword() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) {
        showToast('Please enter your email', 'warning');
        return;
      }

      await Auth.resetPassword(email);
      UI.closeModal('forgotPasswordModal');
    }

    // Enter key on form
    document.getElementById('loginForm').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
  <script src="../js/shared-header.js"></script>
</body>
</html>
